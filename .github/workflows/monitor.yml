name: Park Hyatt Tokyo - Weekend Availability Monitor

on:
  schedule:
    # 5分おきに実行（UTC基準、日本時間は+9時間）
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 手動実行ボタンも有効化
  push:
    branches: [main]  # プッシュ時にも動作確認用に実行

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # seen_dates.json をコミットするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: pip install requests playwright

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright browser (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps (always)
        run: playwright install-deps chromium

      - name: Run availability checker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python checker.py

      - name: Commit updated seen_dates.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_dates.json checker.log || true
          git diff --cached --quiet || git commit -m "chore: update seen_dates [skip ci]"
          git push
